<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Devy Pro - Web Coding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Paleta VS Code Pro redondeada */
            --bg-main: #1c1c1e;
            --bg-sidebar: #242426;
            --bg-activity: #2c2c2e;
            --bg-terminal: #171718;
            --bg-tabs: #2a2a2c;
            --bg-tab-active: #1c1c1e;
            --bg-context: #2d2d30;
            --bg-suggest: rgba(43, 43, 44, 0.95);
            
            --accent: #007acc; 
            --accent-hover: #1f85de;
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #d4d4d4;
            --text-muted: #8e8e93;
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 4px;
            
            --font-ui: 'Inter', sans-serif;
            --font-mono: 'Fira Code', monospace;
            --font-logo: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Scrollbars Estilo VS Code */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: var(--font-ui);
            background-color: #121212;
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 6px; /* Efecto ventana flotante estética */
        }

        /* Contenedor Principal Redondeado */
        .window-frame {
            display: flex;
            flex-direction: column;
            flex: 1;
            background-color: var(--bg-main);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* 1. BARRA DE ACTIVIDAD (Izquierda) */
        .activity-bar {
            width: 56px;
            background-color: var(--bg-activity);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            z-index: 10;
        }

        .activity-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 6px;
            align-items: center;
        }

        .activity-btn {
            position: relative;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .activity-btn:hover { 
            color: #ffffff; 
            background-color: rgba(255, 255, 255, 0.05);
            transform: scale(1.04);
        }
        
        .activity-btn.active { 
            color: #ffffff; 
            background-color: rgba(0, 122, 204, 0.15); 
        }

        .activity-btn::after {
            content: '';
            position: absolute;
            left: -4px; top: 25%; height: 50%; width: 3px;
            background-color: var(--accent);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .activity-btn.active::after { opacity: 1; }

        /* LOGO DEVY PREMIUM */
        .brand-logo {
            font-family: var(--font-logo);
            font-size: 22px;
            font-weight: 800;
            padding: 14px 20px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .brand-logo .colored { color: var(--accent); }
        .brand-logo .white { color: #ffffff; }

        /* 2. BARRA LATERAL (Sidebar) */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 0 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
        }

        .sidebar-tools { display: flex; gap: 6px; }

        .tool-btn {
            width: 26px;
            height: 26px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }
        .tool-btn:hover { color: #ffffff; background-color: rgba(255, 255, 255, 0.08); }

        .sidebar-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 8px 0;
        }

        .panel-section { display: none; height: 100%; flex-direction: column; }
        .panel-section.active { display: flex; animation: panelFade 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes panelFade { 
            from { opacity: 0; transform: translateX(-6px); } 
            to { opacity: 1; transform: translateX(0); } 
        }

        /* Árbol de archivos */
        .tree-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            margin: 2px 8px;
            border-radius: var(--radius-sm);
            transition: all 0.15s;
        }
        .tree-item:hover { background-color: rgba(255, 255, 255, 0.04); }
        .tree-item.active { background-color: rgba(0, 122, 204, 0.14); color: #ffffff; }

        .file-info { display: flex; align-items: center; gap: 10px; }
        .icon-file { color: #e34c26; }
        .icon-js { color: #f7df1e; }
        .icon-css { color: #264de4; }
        .icon-generic { color: var(--accent); }

        .file-options-trigger { opacity: 0; color: var(--text-muted); transition: opacity 0.2s; }
        .tree-item:hover .file-options-trigger { opacity: 1; }

        /* Contenedor de Extensiones */
        .extension-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 12px;
            margin: 8px 12px;
            display: flex;
            gap: 12px;
            align-items: start;
            transition: transform 0.2s, background-color 0.2s;
        }
        .extension-card:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-1px);
        }
        .ext-icon {
            padding: 6px;
            background: rgba(0, 122, 204, 0.1);
            border-radius: var(--radius-sm);
            color: var(--accent);
        }
        .ext-info { flex: 1; }
        .ext-title { font-size: 13px; font-weight: 600; color: #ffffff; }
        .ext-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }
        .ext-btn {
            margin-top: 8px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            background: var(--accent);
            color: white;
            transition: background 0.2s;
        }
        .ext-btn.installed {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        /* Inputs Modernos */
        .search-input-box { padding: 8px 12px; }
        .sidebar-input {
            width: 100%;
            background: #2d2d30;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: #ffffff;
            padding: 8px 10px;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .sidebar-input:focus { border-color: var(--accent); }
        .panel-placeholder { padding: 16px; color: var(--text-muted); font-size: 12px; text-align: center; }

        /* ÁREA DEL EDITOR */
        .main-editor-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-main);
            position: relative;
        }

        .tabs-bar {
            height: 40px;
            background-color: var(--bg-tabs);
            display: flex;
            overflow-x: auto;
            align-items: flex-end;
            padding-left: 6px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 34px;
            background-color: rgba(0, 0, 0, 0.15);
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            gap: 8px;
            margin-right: 4px;
            border: 1px solid transparent;
            border-bottom: none;
            transition: all 0.2s;
        }
        .tab.active { 
            background-color: var(--bg-tab-active); 
            color: #ffffff;
            border-color: var(--border-color);
            font-weight: 500;
        }

        .editor-workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Nuevo contenedor obligatorio de Mónaco (reemplaza al textarea viejo) */
        #editor-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* MENÚ CONTEXTUAL */
        .context-menu {
            position: absolute;
            background-color: var(--bg-context);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
            width: 165px;
            display: none;
            padding: 4px;
            animation: menuScale 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes menuScale { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .context-menu-item {
            padding: 8px 12px;
            font-size: 12px;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: var(--radius-sm);
        }
        .context-menu-item:hover { background-color: var(--accent); }

        /* TERMINAL INFERIOR REDONDEADA */
        .bottom-panel {
            height: 160px;
            background-color: var(--bg-terminal);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .panel-tabs {
            height: 34px;
            background-color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-tab { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
        .panel-tab.active { color: #ffffff; position: relative; height: 100%; display: flex; align-items: center; }
        .panel-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background-color: var(--accent); }
        .panel-body { flex: 1; padding: 12px 16px; font-family: var(--font-mono); font-size: 12px; color: #34d399; overflow-y: auto; white-space: pre-line;}

        /* BARRA DE ESTADO INFERIOR */
        .status-bar {
            height: 26px;
            background-color: var(--accent);
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            font-size: 11px;
            z-index: 100;
        }

        .status-left, .status-right { display: flex; align-items: center; gap: 14px; }
        .status-item { display: flex; align-items: center; gap: 6px; cursor: pointer; height: 26px; padding: 0 8px; transition: background-color 0.2s; }
        .status-item:hover { background-color: rgba(255, 255, 255, 0.15); }
        .status-item.live-btn { background-color: rgba(0, 0, 0, 0.2); font-weight: 600; }
        .status-item.live-btn.running { background-color: #22c55e; animation: pulseGlow 2s infinite; }

        @keyframes pulseGlow {
            0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; }
        }
    </style>
</head>
<body>

                </div>

                    </div>
                    <div class="sidebar-content" id="extensionsContainer"></div>
                </div>
            </aside>

            <main class="main-editor-zone">

                        <div class="panel-tab">Output</div>
                    </div>
                    <div class="panel-body" id="terminalOutput">
                        devy@workspace:~$ Entorno Devy Pro v2.5 cargado de forma óptima con Monaco Engine.
                    </div>
                </div>
            </main>
        </div>

                <div class="status-item" style="background-color: rgba(0,0,0,0.15)">
                    <i data-lucide="terminal" size="12"></i>
                    <span>Pro Environment</span>
                </div>
                <div class="status-item">
                    <i data-lucide="git-branch" size="12"></i>
                    <span>main</span>
                </div>
